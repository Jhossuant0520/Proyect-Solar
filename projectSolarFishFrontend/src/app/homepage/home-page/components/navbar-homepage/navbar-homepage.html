<!-- navbar-homepage.html -->
<div class="navbar-wrapper">

  <nav class="navbar" [class.scrolled]="scrolled">
    <div class="logo">
      <img src="LogoSolvix3.1.png" alt="Logo Solvix" class="logo-img">
    </div>

    <div class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <!-- Solo links de escritorio dentro del navbar -->
    <ul class="nav-links desktop-nav">
      <li><a class="nav-item" [class.active]="activeSection==='inicio'" (click)="scrollToSection($event, 'inicio')">Inicio</a></li>
      <li><a class="nav-item" [class.active]="activeSection==='steps'" (click)="scrollToSection($event, 'steps')">Cómo funciona</a></li>
      <li><a class="nav-item" [class.active]="activeSection==='services'" (click)="scrollToSection($event, 'services')">Servicios</a></li>
      <li><a class="nav-item" [class.active]="activeSection==='about'" (click)="scrollToSection($event, 'about')">Nosotros</a></li>
      <li><a class="nav-item" [class.active]="activeSection==='faq'" (click)="scrollToSection($event, 'faq')">FAQ</a></li>
      <li><a class="nav-item" [class.active]="activeSection==='contact'" (click)="scrollToSection($event, 'contact')">Contacto</a></li>
    </ul>

    <div class="nav-actions desktop-actions">
      <button class="btn ghost" routerLink="/login">Iniciar sesión</button>
      <button class="btn primary" routerLink="/register">Calcular gratis →</button>
    </div>
  </nav>

  <!--  Menú móvil FUERA del navbar (mismo nivel) -->
  <div class="mobile-menu" [class.active]="menuOpen">
    <ul>
      <li><a class="nav-item" (click)="scrollToSection($event, 'inicio')">Inicio</a></li>
      <li><a class="nav-item" (click)="scrollToSection($event, 'steps')">Cómo funciona</a></li>
      <li><a class="nav-item" (click)="scrollToSection($event, 'services')">Servicios</a></li>
      <li><a class="nav-item" (click)="scrollToSection($event, 'about')">Nosotros</a></li>
      <li><a class="nav-item" (click)="scrollToSection($event, 'faq')">FAQ</a></li>
      <li><a class="nav-item" (click)="scrollToSection($event, 'contact')">Contacto</a></li>
    </ul>
    <div class="mobile-actions">
      <button class="btn ghost" routerLink="/login" (click)="toggleMenu()">Iniciar sesión</button>
      <button class="btn primary" routerLink="/register" (click)="toggleMenu()">Calcular gratis →</button>
    </div>
  </div>

</div>
