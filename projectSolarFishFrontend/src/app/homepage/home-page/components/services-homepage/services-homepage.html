<section class="services">

  <div class="header">
    <h2>¿Por qué elegirnos?</h2>
    <p>Soluciones inteligentes para energía solar</p>
  </div>

  <div class="services-grid">

    @for (s of servicios; track s) {

    <div class="card">

      <div class="icon">
        {{ s.icono }}
      </div>

      <h3>{{ s.titulo }}</h3>

      <p>{{ s.descripcion }}</p>

      <div class="glow"></div>

    </div>

    }

  </div>

</section>
