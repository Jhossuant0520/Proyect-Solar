<ng-container *ngIf="authService.estaAutenticado(); else publicRoutes">

  <mat-sidenav-container class="app-sidenav-container">

    <!-- Barra lateral -->
    <mat-sidenav #sidenav mode="side" [opened]="true" class="app-sidenav">
      
      <!-- Encabezado de la barra lateral -->
      <div class="sidebar-header">
        <img src="/solarfish-logo.png" alt="Logo Computer & Electronic" class="sidebar-logo" />
        <span class="app-sidebar-title">Bienvenido Usuario</span>
      </div>

      <!-- Menú de navegación -->
      <mat-nav-list class="sidebar-menu">
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" >
          <span class="menu-item">
            <mat-icon>home</mat-icon>
            <span class="menu-text">Inicio</span>
          </span>
        </a>
      
        <a mat-list-item routerLink="/finca" routerLinkActive="active-link">
          <span class="menu-item">
            <mat-icon>add_home_work</mat-icon>
            <span class="menu-text">Registrar Finca</span>
          </span>
        </a>
      
        <a mat-list-item routerLink="/listafinca" routerLinkActive="active-link" >
          <span class="menu-item">
            <mat-icon>list_alt</mat-icon>
            <span class="menu-text">Listado de Fincas</span>
          </span>
        </a>
      
        <a mat-list-item routerLink="/componentesenergeticos" routerLinkActive="active-link" >
          <span class="menu-item">
            <mat-icon><span class="material-symbols-outlined">
              electric_bolt
              </span></mat-icon>
            <span class="menu-text">Registro de Componentes </span>
          </span>
        </a>

        <a mat-list-item routerLink="/listcomponet" routerLinkActive="active-link" >
          <span class="menu-item">
            <mat-icon><span class="material-symbols-outlined">
              view_list
              </span></mat-icon>
            <span class="menu-text">Listado de Componentes </span>
          </span>
        </a>

        <a mat-list-item routerLink="/demanda" routerLinkActive="active-link" >
          <span class="menu-item">
            <mat-icon><span class="material-symbols-outlined">
              assessment
              </span></mat-icon>
            <span class="menu-text">Demanda Energetica </span>
          </span>
        </a>
      
        <a mat-list-item (click)="logout()">
          <span class="menu-item">
            <mat-icon>logout</mat-icon>
            <span class="menu-text">Cerrar Sesión</span>
          </span>
        </a>
      </mat-nav-list>
      
    </mat-sidenav>

    <!-- Contenido principal -->
    <mat-sidenav-content class="app-sidenav-content">
      
      <!-- Barra superior -->
      <mat-toolbar color="primary" class="app-toolbar">
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
        
        <span class="toolbar-title">SolarFish</span>
        <span class="spacer"></span>
        <span class="user-welcome">Hola, {{ nombreUsuarioToolbar }}</span>
      </mat-toolbar>

      <!-- Área de contenido -->
      <div class="main-content-area">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>

  </mat-sidenav-container>
</ng-container>

<!-- Plantilla para rutas públicas -->
<ng-template #publicRoutes>
  <router-outlet></router-outlet>
</ng-template>
