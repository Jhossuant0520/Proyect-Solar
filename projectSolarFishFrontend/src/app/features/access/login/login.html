<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema</title>
</head>
<body>

<div class="login-page-wrapper">
  <div class="ambient-glow glow-cyan"></div>
  <div class="ambient-glow glow-purple"></div>
  
  <div class="bg-grid"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="brand-logo">
        <svg viewBox="0 0 100 100" class="logo-svg">
          <polygon points="50,5 95,25 95,75 50,95 5,75 5,25" class="outer-hex" />
          <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" class="inner-hex" />
          <line x1="50" y1="5" x2="50" y2="95" class="logo-line" />
          <line x1="5" y1="25" x2="95" y2="75" class="logo-line" />
          <line x1="5" y1="75" x2="95" y2="25" class="logo-line" />
        </svg>
      </div>
      <h1 class="brand-title">BIENVENIDO</h1>
      <p class="brand-subtitle">ACCESO AL SISTEMA DE CONTROL</p>
    </div>

    <form class="login-form">
      <div class="input-group-row">
        <div class="input-wrapper">
          <input type="text" id="username" placeholder=" " required />
          <label for="username">Usuario*</label>
          <div class="input-glow"></div>
        </div>

        <div class="input-wrapper">
          <input type="password" id="password" placeholder=" " required />
          <label for="password">Contraseña*</label>
          <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" class="eye-icon">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
          <div class="input-glow"></div>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <span class="btn-text">Ingresar</span>
        <div class="wave-overlay"></div>
      </button>

      <div class="form-footer">
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.querySelector('.login-form');
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.querySelector('.toggle-password');

    // Manejo del envío del formulario
    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault(); // Evita que la página se recargue

      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value;

      try {
        // REEMPLAZA ESTA URL por la ruta de tu API de login (ej: '/api/login' o 'http://localhost:3000/login')
        const response = await fetch('https://tu-api.com/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Si el servidor responde que todo está bien (Status 200)
          alert('¡Ingreso exitoso!');
          
          // Guardar el token de sesión si tu servidor maneja JWT
          if(data.token) {
            localStorage.setItem('userToken', data.token);
          }

          // Redirigir al panel principal de tu sistema
          window.location.href = '/dashboard.html'; 
        } else {
          // Si el servidor rechaza las credenciales (Status 401, 400, etc)
          alert(data.message || 'Credenciales incorrectas. Inténtalo de nuevo.');
        }

      } catch (error) {
        console.error('Error en la conexión:', error);
        alert('Hubo un problema al conectar con el servidor. Verifica tu red.');
      }
    });

    // Funcionalidad del botón ojo para ver contraseña
    togglePasswordBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePasswordBtn.style.opacity = isPassword ? '1' : '0.6';
    });
  });
</script>

</body>
</html>
