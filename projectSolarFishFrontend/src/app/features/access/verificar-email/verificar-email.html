<div class="verificar-page">

  <div class="verificar-card">

    @if (estado === 'cargando') {

      <div class="estado fade-in">

        <div class="spinner"></div>

        <h1>Verificando tu cuenta</h1>

        <p class="subtitulo">
          Estamos comprobando tu enlace de verificación...
        </p>

      </div>

    } @else if (estado === 'exito') {

      <div class="estado fade-in">

        <div class="icono icono-success">
          ✓
        </div>

        <h1>¡Cuenta verificada!</h1>

        <p class="mensaje">
          {{ mensaje }}
        </p>

        <a
          routerLink="/login"
          class="btn-primary"
        >
          Iniciar sesión
        </a>

      </div>

    } @else {

      <div class="estado fade-in">

        <div class="icono icono-error">
          ✕
        </div>

        <h1>No se pudo verificar</h1>

        <p class="mensaje">
          {{ mensaje }}
        </p>

        @if (errorExpirado) {

          <button
            type="button"
            class="btn-primary"
            (click)="solicitarNuevoEnlace()"
          >
            Solicitar nuevo enlace
          </button>

        }

        <a
          routerLink="/login"
          class="link-secondary"
        >
          ← Volver al inicio de sesión
        </a>

      </div>

    }

  </div>

</div>
