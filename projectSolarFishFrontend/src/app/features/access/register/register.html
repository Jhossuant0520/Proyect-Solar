<div class="page">

  <div class="card">

    <!-- ICONO -->
    <div class="icon"></div>

    <!-- TITULO -->
    <h1>CREAR CUENTA</h1>
    <p class="subtitle">ACCESO AL SISTEMA DE CONTROL</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- USUARIO -->
      <label>Usuario</label>
      <div class="input">
        <input type="text" formControlName="nombreUsuario" placeholder="usuario">
      </div>

      <!-- EMAIL -->
      <label>Email</label>
      <div class="input">
        <input type="email" formControlName="email" placeholder="correo@dominio.com">
      </div>

      <!-- PASSWORD -->
      <label>Contraseña</label>
      <div class="input password">
        <input 
          [type]="showPassword ? 'text' : 'password'"
          formControlName="passwordUsuario"
          placeholder="••••••••"
        >
        <span (click)="togglePassword()">
          {{ showPassword ? '🙈' : '👁️' }}
        </span>
      </div>

      <!-- CONFIRMAR -->
      <label>Confirmar contraseña</label>
      <div class="input password">
        <input 
          [type]="showConfirm ? 'text' : 'password'"
          formControlName="confirmarPassword"
          placeholder="••••••••"
        >
        <span (click)="toggleConfirm()">
          {{ showConfirm ? '🙈' : '👁️' }}
        </span>
      </div>

      <!-- ERROR -->
      <div class="error" *ngIf="errorMensaje">
        {{ errorMensaje }}
      </div>

      <!-- BOTON -->
      <button type="submit">REGISTRARSE</button>

    </form>

  </div>

</div>
